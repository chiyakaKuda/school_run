name: Build release APK

# Manual only — this produces a debug-signed release build for sideloading
# onto demo/test phones, not a Play Store submission. Runs on Ubuntu
# specifically: building this locally on Windows hits a JDK/Windows bug where
# java.nio.channels.Selector's internal loopback pipe fails via AF_UNIX
# ("Unable to establish loopback connection"), reproduced with a bare 5-line
# Selector.open() test outside of Gradle entirely — it is not fixable with a
# Gradle or JVM flag, and does not exist on Linux runners.
on:
  workflow_dispatch:
    inputs:
      api_base_url:
        description: "Backend base URL (no trailing slash before /api/v1)"
        required: true
        default: "https://school-run-dash-two.vercel.app/api/v1"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - run: flutter pub get

      - name: Build APK
        env:
          API_BASE_URL: ${{ inputs.api_base_url }}
        run: |
          flutter build apk --release \
            --dart-define=API_BASE_URL="$API_BASE_URL" \
            --dart-define=FAKE_AUTH=false

      # The INTERNET permission lives in the main manifest, but only the
      # *merged* manifest proves it survived into the release build — the
      # debug and profile source sets declare it too, which is exactly why
      # its absence used to show up as an unreachable server in a sideloaded
      # APK while `flutter run` worked fine. Fail here rather than ship a
      # build that cannot open a socket.
      - name: Verify INTERNET permission is in the release manifest
        run: |
          set -euo pipefail
          merged=$(find build -path '*merged_manifest*' -name AndroidManifest.xml \
            | grep -i release | head -1)
          if [ -z "$merged" ]; then
            echo "::error::No merged release manifest found under build/"
            exit 1
          fi
          echo "Checking $merged"
          if ! grep -q 'android.permission.INTERNET' "$merged"; then
            echo "::error::INTERNET permission missing from the merged release manifest"
            exit 1
          fi
          echo "INTERNET permission present."

      - uses: actions/upload-artifact@v4
        with:
          name: school-run-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 14
